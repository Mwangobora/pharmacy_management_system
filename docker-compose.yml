version: '3.9'

services:
  db:
    image: postgres:16
    container_name: pharmacy_db
    environment:
      POSTGRES_DB: pharmacy_db
      POSTGRES_USER: pharmacy_user
      POSTGRES_PASSWORD: pharmacy_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_NAME: pharmacy_db
      DB_USER: pharmacy_user
      DB_PASSWORD: pharmacy_pass
      DB_HOST: db
      DB_PORT: 5432

volumes:
  postgres_data:
